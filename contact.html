            <p>If you would like to reach out, please fill out the form below or email me directly

            </p>
        
            <form>
                <label for="name">Name: </label>
                <input type="text" id="name" name="name" maxlength="24" placeholder="Enter your name" required><br>

                <label for="email">Email: </label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="6" cols="64" placeholder="Write your message here..." required></textarea><br>

                <input type="submit" value="Send">
                <input type="reset">
            </form>
